<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Company Links</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Font Awesome Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>

<body>

  <div class="container">

    <!-- Hero Section -->
    <div class="hero">

      <!-- Editable Image -->
      <img src="tfs web hero 2.png" alt="Banner Image">

      <div class="hero-content">
        <h1>Welcome to <br> The Fit Store</h1>
        <p> No.1 For Sports Nutrition In Nigeria.</p>
      </div>

    </div>

    <!-- Links Section -->
    <div class="links">

      <!-- Instagram -->
      <a href="https://www.instagram.com/thefitstore.ng/" class="link-card" target="_blank">

        <div class="icon">
          <i class="fab fa-instagram"></i>
        </div>

        <div class="link-text">
          <h2>Instagram</h2>
          <p>Follow us on Instagram</p>
        </div>

      </a>

      <!-- WhatsApp -->
      <a href="https://wa.me/2348054372352" class="link-card" target="_blank">

        <div class="icon">
          <i class="fab fa-whatsapp"></i>
        </div>

        <div class="link-text">
          <h2>WhatsApp</h2>
          <p>Chat with us on WhatsApp</p>
        </div>

      </a>

      <!-- Website -->
      <a href="https://thefitstore185.bumpa.shop/" class="link-card" target="_blank">

        <div class="icon">
          <i class="fas fa-globe"></i>
        </div>

        <div class="link-text">
          <h2>Website</h2>
          <p>Visit our website</p>
        </div>

      </a>

    </div>

  </div>

</body>
</html>
